<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キッチンマニュアル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="header-title" id="mainTitle">キッチンマニュアル</h1>
            <div class="header-controls">
                <button id="languageToggle" class="btn btn-language">
                    <span id="currentLanguage">日本語</span> / <span id="otherLanguage">नेपाली</span>
                </button>
            </div>
        </div>
    </header>

    <section class="update-banner" aria-live="polite">
        <div class="container">
            <button id="updateBanner" class="update-banner-button" type="button" hidden>
                <span class="update-banner-label" id="updateBannerLabel"></span>
                <span class="update-banner-date" id="updateBannerDate"></span>
                <span class="update-banner-text" id="updateBannerText"></span>
                <span class="update-banner-action" id="updateBannerAction"></span>
            </button>
        </div>
    </section>

    <main class="main-container">
        <div class="container">
            <div class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="料理名やカテゴリーで検索..."
                >
                <button id="clearSearch" class="btn btn-clear" style="display: none;">✕ クリア</button>
            </div>

            <div class="season-selector" id="seasonSelector"></div>

            <div class="tabs">
                <button class="tab-button active" data-tab="menus" id="tabMenus">献立</button>
                <button class="tab-button" data-tab="recipes" id="tabRecipes">レシピ</button>
                <button class="tab-button" data-tab="foodSafety" id="tabFoodSafety">食品衛生</button>
                <button class="tab-button" data-tab="updates" id="tabUpdates">変更のお知らせ</button>
            </div>

            <div id="menus" class="tab-content active">
                <div class="menu-selector" id="menuSelector"></div>

<div id="menuContent" class="content-area"></div>
            </div>

            <div id="recipes" class="tab-content">
                <div class="recipe-grid" id="recipeGrid"></div>

                <div id="recipeModal" class="modal">
                    <div class="modal-content">
                        <button class="modal-close" id="closeModal">✕</button>
                        <div id="recipeDetail"></div>
                    </div>
                </div>
            </div>

            <div id="foodSafety" class="tab-content">
                <div id="foodSafetyContent" class="food-safety-page"></div>
            </div>

            <div id="foodSafetyLightbox" class="food-safety-lightbox" aria-hidden="true">
                <div class="food-safety-lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="foodSafetyLightboxCaption">
                    <button class="food-safety-lightbox-close" id="closeFoodSafetyLightbox" type="button" aria-label="画像を閉じる">✕</button>
                    <img id="foodSafetyLightboxImage" class="food-safety-lightbox-image" alt="">
                    <p id="foodSafetyLightboxCaption" class="food-safety-lightbox-caption"></p>
                </div>
            </div>

            <div id="updates" class="tab-content">
                <section class="update-notice" aria-labelledby="updateNoticeTitle">
                    <h2 class="update-notice-title" id="updateNoticeTitle">変更のお知らせ / परिवर्तन सूचना</h2>
                    <ul class="update-notice-list" id="updateNoticeList"></ul>
                    <button id="updateNoticeToggle" class="btn update-notice-toggle" type="button" hidden></button>
                </section>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 キッチンマニュアル</p>
        </div>
    </footer>

    <button id="scrollToTop" class="scroll-to-top" title="上に戻る">
        ↑
    </button>

    <script src="menu-data.js"></script>
    <script src="kana-map.js"></script>
    <script src="app.js"></script>
</body>
</html>
